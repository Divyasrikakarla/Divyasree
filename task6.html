<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Feedback</title>

<style>
    body{
        font-family: Arial, sans-serif;
        margin: 20px;
    }

    form{
        width: 500px;
        margin: auto;
        padding: 20px;
        border: 2px solid black;
        background-color: #f2f2f2;
    }

    label{
        font-weight: bold;
    }

    input, select, textarea{
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
    }

    button{
        background-color: blue;
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
    }

    img{
        width: 200px;
        border: 2px solid black;
        display: block;
        margin: 10px auto;
    }

    #message{
        color: green;
        font-weight: bold;
    }
</style>

<script>
    /* onblur validation */
    function validatePhone() {
        let phone = document.getElementById("phone").value;

        if(phone.length != 10){
            alert("Phone number must contain 10 digits");
        }
    }

    /* onchange event */
    function showFee() {
        let event = document.getElementById("event").value;
        let fee = "";

        if(event == "Cleanup")
            fee = "$10";
        else if(event == "Festival")
            fee = "$20";
        else if(event == "Sports")
            fee = "$15";

        document.getElementById("fee").innerHTML =
        "Event Fee: " + fee;
    }

    /* onclick event */
    function submitForm() {
        document.getElementById("message").innerHTML =
        "Feedback Submitted Successfully!";
    }

    /* ondblclick event */
    function enlargeImage() {
        document.getElementById("eventImage").style.width = "400px";
    }

    /* keyboard event */
    function countChars() {
        let text = document.getElementById("feedback").value;
        document.getElementById("count").innerHTML =
        "Characters: " + text.length;
    }
</script>

</head>

<body>

<h1 align="center">Event Feedback Form</h1>

<form>

    <label>Phone Number:</label>
    <input type="text"
           id="phone"
           onblur="validatePhone()"
           placeholder="Enter 10-digit phone number">

    <label>Select Event:</label>
    <select id="event" onchange="showFee()">
        <option value="">Choose Event</option>
        <option value="Cleanup">Community Cleanup</option>
        <option value="Festival">Food Festival</option>
        <option value="Sports">Sports Day</option>
    </select>

    <p id="fee"></p>

    <label>Feedback:</label>
    <textarea id="feedback"
              rows="4"
              onkeyup="countChars()"
              placeholder="Type your feedback here"></textarea>

    <p id="count">Characters: 0</p>

    <button type="button" onclick="submitForm()">
        Submit Feedback
    </button>

    <p id="message"></p>

</form>

<h2 align="center">Double Click the Image</h2>

<img src="https://static.vecteezy.com/system/resources/thumbnails/070/863/407/small/diverse-community-volunteers-working-together-to-clean-up-a-local-park-photo.jpg"
     id="eventImage"
     ondblclick="enlargeImage()"
     alt="Community Event">

</body>
</html>
